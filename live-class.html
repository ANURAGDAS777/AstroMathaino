<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Class - AstroMathaino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .cosmic-gradient { background: linear-gradient(135deg, #1a0f3c 0%, #2d1b69 50%, #1e1e2e 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .comment-bubble { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-thin { scrollbar-width: thin; scrollbar-color: rgba(156, 163, 175, 0.5) transparent; }
    </style>
</head>

<body class="cosmic-gradient min-h-screen text-white">

    <!-- Navigation -->
    <nav class="bg-gray-900/80 backdrop-blur-md border-b border-indigo-500/30 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-400 to-purple-600 rounded-full flex items-center justify-center">
                    <i data-lucide="orbit" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-xl font-bold">AstroMathaino</span>
                <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded-full">LIVE CLASS</span>
            </div>
            <div class="flex items-center gap-6">
                <span class="text-gray-300" id="student-name">Welcome, Student</span>
                <a href="student.html" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-4 py-2 rounded-lg transition-colors">Exit</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8">
        <!-- Course Header -->
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h1 class="text-2xl font-bold text-indigo-400 mb-1" id="course-title">Loading...</h1>
                    <p class="text-gray-300" id="course-category">Loading...</p>
                </div>
                <div class="text-right">
                    <div class="flex items-center gap-2 text-green-400 text-sm mb-2">
                        <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                        <span>LIVE NOW</span>
                    </div>
                </div>
            </div>
            <p class="text-gray-300 mb-4" id="course-description">Loading...</p>
            <div class="flex gap-4">
                <button onclick="joinZoom()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg flex items-center gap-2">
                    <i data-lucide="video" class="w-4 h-4"></i>
                    Join Zoom Meeting
                </button>
                <button onclick="shareScreen()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg flex items-center gap-2">
                    <i data-lucide="share-2" class="w-4 h-4"></i>
                    Share Screen
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Main Content -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Zoom Meeting Area -->
                <div class="glass rounded-xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="monitor" class="w-5 h-5 text-indigo-400"></i>
                        Live Meeting
                    </h3>
                    <div class="bg-gray-900/50 rounded-lg p-8 text-center border-2 border-dashed border-gray-600">
                        <i data-lucide="video" class="w-16 h-16 text-gray-400 mx-auto mb-4"></i>
                        <h4 class="text-lg font-medium text-gray-300 mb-2">Join the Live Session</h4>
                        <p class="text-gray-400 mb-4">Click the "Join Zoom Meeting" button above to enter the live class</p>
                        <div id="zoom-link-display" class="text-sm text-indigo-400 break-all"></div>
                    </div>
                </div>

                <!-- Class Materials -->
                <div class="glass rounded-xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="book-open" class="w-5 h-5 text-purple-400"></i>
                        Class Materials
                    </h3>
                    <div class="space-y-3" id="class-materials">
                        <p class="text-gray-400 text-sm text-center py-4">Loading materials...</p>
                    </div>
                </div>
            </div>

            <!-- Comments Sidebar -->
            <div class="space-y-6">
                <!-- Live Comments -->
                <div class="glass rounded-xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="message-circle" class="w-5 h-5 text-green-400"></i>
                        Live Comments
                    </h3>

                    <div id="comments-container" class="space-y-3 mb-4 max-h-96 overflow-y-auto scrollbar-thin">
                        <!-- Comments loaded here -->
                    </div>

                    <div class="border-t border-gray-700 pt-4">
                        <div class="flex gap-2">
                            <input type="text" id="comment-input" placeholder="Share your thoughts..." class="flex-1 px-3 py-2 rounded-lg bg-gray-900 border border-gray-700 focus:border-indigo-500 focus:outline-none text-sm" maxlength="200">
                            <button onclick="postComment()" class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-lg">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Online Students -->
                <div class="glass rounded-xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="users" class="w-5 h-5 text-blue-400"></i>
                        Online Now
                    </h3>
                    <div id="online-students" class="space-y-2">
                        <!-- Online students shown here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course');
        let currentCourse = null;
        let currentUser = JSON.parse(localStorage.getItem('astro_user') || '{}');

        // Auth check
        if (!currentUser.email) {
            window.location.href = 'login.html';
        }

        // BUG 25 FIX: guard against undefined name
        document.getElementById('student-name').textContent = `Hi, ${currentUser.name || 'Student'}`;

        // BUG 23 FIX: guard against missing courseId
        if (!courseId) {
            document.getElementById('course-title').textContent = 'No Course Selected';
            document.getElementById('course-description').textContent = 'Please go back and select a course from the student portal.';
            document.getElementById('course-category').textContent = '';
        }

        // Load course
        if (courseId) {
            db.collection('courses').doc(courseId).get().then(doc => {
                if (doc.exists) {
                    currentCourse = doc.data();
                    document.getElementById('course-title').textContent = currentCourse.title || 'Live Class';
                    document.getElementById('course-category').textContent = currentCourse.category || 'Astronomy';
                    document.getElementById('course-description').textContent = currentCourse.description || 'Welcome to today\'s class';
                    
                    if (currentCourse.liveUrl) {
                        document.getElementById('zoom-link-display').innerHTML = `<strong>Meeting Link:</strong> <a href="${currentCourse.liveUrl}" target="_blank" class="underline">${currentCourse.liveUrl}</a>`;
                    }
                    // Load class materials dynamically
                    loadMaterials(currentCourse.materials || '');
                }
            });
        }

        // Join Zoom
        function joinZoom() {
            if (currentCourse && currentCourse.liveUrl) {
                window.open(currentCourse.liveUrl, '_blank');
            } else {
                alert('Zoom link not available yet');
            }
        }

        function shareScreen() {
            alert('Screen sharing feature coming soon!');
        }

        // Load class materials from course.materials field
        function loadMaterials(materialsText) {
            const container = document.getElementById('class-materials');
            if (!materialsText || !materialsText.trim()) {
                container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No materials uploaded yet.</p>';
                return;
            }

            const lines = materialsText.trim().split('\n').filter(l => l.trim());
            container.innerHTML = '';
            lines.forEach((line, i) => {
                const parts = line.split('|');
                const url = parts[0].trim();
                const label = parts[1] ? parts[1].trim() : `Material ${i + 1}`;
                if (!url) return;

                // Detect file type for icon
                const isPdf = url.toLowerCase().includes('.pdf') || url.toLowerCase().includes('pdf');
                const isVideo = url.toLowerCase().includes('youtube') || url.toLowerCase().includes('youtu.be') || url.toLowerCase().includes('drive');
                const icon = isPdf ? 'file-text' : isVideo ? 'play-circle' : 'link';
                const iconColor = isPdf ? 'text-red-400' : isVideo ? 'text-green-400' : 'text-indigo-400';
                const bgColor = isPdf ? 'bg-red-500/20' : isVideo ? 'bg-green-500/20' : 'bg-indigo-500/20';

                container.innerHTML += `
                    <div class="flex items-center justify-between gap-3 p-3 bg-gray-800/30 hover:bg-gray-800/50 rounded-lg transition-colors">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-9 h-9 ${bgColor} rounded-lg flex items-center justify-center flex-shrink-0">
                                <i data-lucide="${icon}" class="w-4 h-4 ${iconColor}"></i>
                            </div>
                            <p class="font-medium text-sm truncate">${label}</p>
                        </div>
                        <a href="${url}" target="_blank"
                           class="flex-shrink-0 bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1 transition-colors">
                            <i data-lucide="download" class="w-3 h-3"></i> Open
                        </a>
                    </div>`;
            });
            lucide.createIcons();
        }

        // BUG 22 FIX: use onSnapshot only — called once, realtime updates automatically.
        // Previously also called via setInterval(loadComments, 5000) which created a new onSnapshot
        // listener every 5 seconds → duplicate comments + memory leak.
        // BUG 24 FIX: postComment no longer calls loadComments() — onSnapshot handles it.
        let commentsUnsubscribe = null;
        function loadComments() {
            // BUG 23 FIX: skip if no courseId
            if (!courseId) return;
            // Unsubscribe previous listener if any to avoid duplicates
            if (commentsUnsubscribe) commentsUnsubscribe();

            const container = document.getElementById('comments-container');
            commentsUnsubscribe = db.collection('comments')
                .where('courseId', '==', courseId)
                .orderBy('timestamp', 'desc')
                .onSnapshot(snapshot => {
                    container.innerHTML = '';
                    if (snapshot.empty) {
                        container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No comments yet. Be the first!</p>';
                        return;
                    }
                    snapshot.forEach(doc => {
                        const comment = doc.data();
                        const isMe = comment.email === currentUser.email;
                        container.innerHTML += `
                            <div class="comment-bubble bg-gray-800/30 rounded-lg p-3 ${isMe ? 'border-l-2 border-indigo-400' : ''}">
                                <p class="font-medium text-sm ${isMe ? 'text-indigo-400' : ''}">${comment.name || 'Student'}${isMe ? ' (You)' : ''}</p>
                                <p class="text-sm text-gray-300 mt-1">${comment.text}</p>
                            </div>
                        `;
                    });
                });
        }

        // BUG 24 FIX: do NOT call loadComments() after posting — onSnapshot is already realtime
        function postComment() {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || !courseId) return;

            db.collection('comments').add({
                courseId: courseId,
                name: currentUser.name || 'Student',
                email: currentUser.email,
                text: text,
                timestamp: new Date().toISOString()
            }).then(() => {
                input.value = '';
            }).catch(err => {
                console.error('Comment error:', err);
            });
        }

        // Allow Enter key to post comment
        document.getElementById('comment-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postComment(); }
        });

        // Update online students
        function updateOnlineStudents() {
            const container = document.getElementById('online-students');
            container.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                    <span class="text-sm">${currentUser.name || 'Student'} (You)</span>
                </div>
            `;
        }

        // BUG 22 FIX: NO setInterval — onSnapshot is already realtime
        loadComments();
        updateOnlineStudents();
    </script>
</body>
</html>
